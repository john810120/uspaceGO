<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>USPACE換電維護紀錄</title>

<style>

body{
font-family: Arial;
background:#eef2f7;
margin:0;
}

.header{
background:#17375e;
color:white;
text-align:center;
padding:15px;
font-size:22px;
font-weight:bold;
}

.container{
max-width:500px;
margin:auto;
padding:12px;
}

.card{
background:white;
border-radius:14px;
padding:14px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

label{
font-weight:bold;
font-size:14px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
background:#17375e;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.smallBtn{
padding:8px 12px;
margin-right:6px;
}

.row{
display:flex;
gap:8px;
}

.row > *{
flex:1;
}

.stats{
display:flex;
gap:10px;
margin:10px 0;
}

.statBox{
background:#e5ebf5;
padding:8px 10px;
border-radius:8px;
font-size:14px;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th{
background:#17375e;
color:white;
padding:8px;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
}

.deleteBtn{
background:#c0392b;
padding:6px 10px;
}

.result-success{
background:#c8e6c9;
padding:4px 6px;
border-radius:6px;
}

.result-fail{
background:#f8d7da;
padding:4px 6px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="header">USPACE換電維護紀錄</div>

<div class="container">

<div class="card">

<label>場域名稱</label>
<select id="siteSelect"></select>

<input id="newSite" placeholder="新增場域名稱">

<button class="smallBtn" onclick="addSite()">新增場域</button>
<button class="smallBtn deleteBtn" onclick="deleteSite()">刪除場域</button>

<label>車位號碼 (可多個或區間)</label>
<input id="spot" placeholder="例: 1-5 或 1,2,3">

<div class="row">

<div>
<label>維護結果</label>
<select id="result">
<option value="換電">換電</option>
<option value="有車">有車</option>
</select>
</div>

<div>
<label>備註</label>
<input id="note">
</div>

</div>

<button onclick="addRecord()">新增維護紀錄</button>

</div>

<div class="card">

<label>搜尋場域</label>
<input id="search" oninput="render()">

<div class="row">
<button onclick="changeDate(-1)">◀</button>
<div id="dateText"></div>
<button onclick="changeDate(1)">▶</button>
</div>

<div class="stats">
<div class="statBox" id="successCount">換電 : 0</div>
<div class="statBox" id="failCount">有車 : 0</div>
</div>

<table>

<thead>
<tr>
<th>場域</th>
<th>車位</th>
<th>結果</th>
<th>日期</th>
<th>備註</th>
<th>刪除</th>
</tr>
</thead>

<tbody id="recordTable"></tbody>

</table>

</div>

</div>

<script>

let sites = JSON.parse(localStorage.getItem("sites") || '["光復大廈"]');
let records = JSON.parse(localStorage.getItem("records") || "[]");

let currentDate = new Date().toISOString().split("T")[0];

function save(){
localStorage.setItem("records",JSON.stringify(records));
localStorage.setItem("sites",JSON.stringify(sites));
}

function updateSiteList(){

let s=document.getElementById("siteSelect");

s.innerHTML="";

sites.forEach(v=>{
let op=document.createElement("option");
op.text=v;
s.appendChild(op);
});

}

function addSite(){

let name=document.getElementById("newSite").value.trim();

if(!name)return;

sites.push(name);

save();

updateSiteList();

document.getElementById("newSite").value="";

}

function deleteSite(){

let s=document.getElementById("siteSelect").value;

sites=sites.filter(a=>a!=s);

save();

updateSiteList();

}

function expandSpots(text){

let arr=[];

text.split(",").forEach(p=>{

if(p.includes("-")){

let [a,b]=p.split("-").map(Number);

for(let i=a;i<=b;i++)arr.push(i);

}else{

arr.push(p);

}

});

return arr.join(",");

}

function addRecord(){

let site=document.getElementById("siteSelect").value;
let spot=expandSpots(document.getElementById("spot").value);
let result=document.getElementById("result").value;
let note=document.getElementById("note").value;

records.push({
site,
spot,
result,
note,
date:currentDate
});

save();

render();

}

function deleteRecord(i){

records.splice(i,1);

save();

render();

}

function changeDate(n){

let d=new Date(currentDate);

d.setDate(d.getDate()+n);

currentDate=d.toISOString().split("T")[0];

render();

}

function render(){

document.getElementById("dateText").innerText=currentDate;

let search=document.getElementById("search").value;

let html="";

let success=0;
let fail=0;

records.forEach((r,i)=>{

if(r.date!=currentDate)return;

if(search && !r.site.includes(search))return;

if(r.result=="換電") success++;
else fail++;

html+=`
<tr>

<td>${r.site}</td>

<td>${r.spot}</td>

<td class="${r.result=='換電'?'result-success':'result-fail'}">${r.result}</td>

<td>${r.date}</td>

<td>${r.note||""}</td>

<td>
<button class="deleteBtn" onclick="deleteRecord(${i})">刪除</button>
</td>

</tr>
`;

});

document.getElementById("recordTable").innerHTML=html;

document.getElementById("successCount").innerText="換電 : "+success;
document.getElementById("failCount").innerText="有車 : "+fail;

}

updateSiteList();
render();

</script>

</body>
</html>
